<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF6B35" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#FF6B35" stop-opacity="0.18"/>
    </linearGradient>
    
    <filter id="shadowDouble" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.18"/>
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#FF6B35" flood-opacity="0.22"/>
    </filter>
    <linearGradient id="paperHighlight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.35"/>
      <stop offset="35%" stop-color="#ffffff" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <pattern id="paperTexture" width="6" height="6" patternUnits="userSpaceOnUse">
      <rect width="6" height="6" fill="white"/>
      <circle cx="1" cy="1" r="0.3" fill="#e5e5e5" opacity="0.6"/>
      <circle cx="4" cy="3" r="0.25" fill="#e5e5e5" opacity="0.5"/>
    </pattern>
  </defs>
  <rect width="1024" height="1024" fill="url(#bg)"/>
  <rect x="152" y="272" width="720" height="480" fill="url(#paperTexture)" stroke="#FF6B35" stroke-width="2" stroke-dasharray="6 4" rx="24" ry="24" filter="url(#shadowDouble)"/>
  <rect x="152" y="272" width="720" height="480" fill="url(#paperHighlight)" rx="24" ry="24" pointer-events="none"/>
  <circle cx="512" cy="406.4" r="38.4" fill="none" stroke="#FF6B35" stroke-width="3"/>
  <rect x="386" y="460.79999999999995" width="251.99999999999997" height="6" fill="#FF6B35" opacity="0.7" rx="3"/>
  <text x="512" y="608" text-anchor="middle" font-family="Inter" font-size="42" font-weight="600" fill="#FF6B35">Etiquette</text>
</svg>