<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF6B35" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#FF6B35" stop-opacity="0.32"/>
    </linearGradient>
    
    <filter id="shadowDouble" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.18"/>
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#FF6B35" flood-opacity="0.22"/>
    </filter>
    <linearGradient id="paperHighlight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.35"/>
      <stop offset="35%" stop-color="#ffffff" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <pattern id="paperTexture" width="6" height="6" patternUnits="userSpaceOnUse">
      <rect width="6" height="6" fill="white"/>
      <circle cx="1" cy="1" r="0.3" fill="#e5e5e5" opacity="0.6"/>
      <circle cx="4" cy="3" r="0.25" fill="#e5e5e5" opacity="0.5"/>
    </pattern>
  </defs>
  <rect width="1024" height="1024" fill="url(#bg)"/>
  
  <rect x="112" y="253.1764705882353" width="800" height="517.6470588235294" fill="url(#paperTexture)" stroke="#FF6B35" stroke-width="2" rx="16" ry="16" filter="url(#shadowDouble)"/>
  <rect x="112" y="253.1764705882353" width="800" height="517.6470588235294" fill="url(#paperHighlight)" rx="16" ry="16" pointer-events="none"/>
  <rect x="352" y="734.8235294117646" width="320" height="4" fill="#FF6B35" rx="2"/>
       <text x="512" y="524" text-anchor="middle" font-family="Inter" font-size="56" font-weight="700" fill="#FF6B35">Carte Pro</text>
</svg>