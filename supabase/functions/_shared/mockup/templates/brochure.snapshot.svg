<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF6B35" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#FF6B35" stop-opacity="0.16"/>
    </linearGradient>
    <linearGradient id="mgTileCover" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E5F0FC"/>
      <stop offset="100%" stop-color="#B7D3F2"/>
    </linearGradient>
    <radialGradient id="mgCoreCover" cx="45%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#FFE066"/>
      <stop offset="70%" stop-color="#F5B529"/>
      <stop offset="100%" stop-color="#C68708"/>
    </radialGradient>
    <filter id="brochureShadow" x="-15%" y="-15%" width="135%" height="135%">
      <feDropShadow dx="6" dy="14" stdDeviation="16" flood-color="#000" flood-opacity="0.18"/>
    </filter>
    
    <filter id="shadowDouble" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.18"/>
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#FF6B35" flood-opacity="0.22"/>
    </filter>
    <linearGradient id="paperHighlight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.35"/>
      <stop offset="35%" stop-color="#ffffff" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <pattern id="paperTexture" width="6" height="6" patternUnits="userSpaceOnUse">
      <rect width="6" height="6" fill="white"/>
      <circle cx="1" cy="1" r="0.3" fill="#e5e5e5" opacity="0.6"/>
      <circle cx="4" cy="3" r="0.25" fill="#e5e5e5" opacity="0.5"/>
    </pattern>
  </defs>

  <rect width="1024" height="1024" fill="url(#bg)"/>

  <!-- Tranche latérale (pages internes empilées) -->
  <polygon points="310,256 324,252 324,788 310,784" fill="#E8E5DD" stroke="#FF6B35" stroke-width="0.5" opacity="0.95"/><polygon points="307,257.5 321,253.5 321,786.5 307,782.5" fill="#E8E5DD" stroke="#FF6B35" stroke-width="0.5" opacity="0.85"/><polygon points="304,259 318,255 318,785 304,781" fill="#E8E5DD" stroke="#FF6B35" stroke-width="0.5" opacity="0.75"/><polygon points="301,260.5 315,256.5 315,783.5 301,779.5" fill="#E8E5DD" stroke="#FF6B35" stroke-width="0.5" opacity="0.6499999999999999"/>

  <!-- Couverture (trapèze perspective 3/4) -->
  <polygon
    points="324,250 722,242 722,782 324,790"
    fill="url(#mgTileCover)"
    stroke="#FF6B35"
    stroke-width="1.5"
    filter="url(#brochureShadow)"
  />
  <polygon
    points="324,250 722,242 722,782 324,790"
    fill="url(#paperHighlight)"
    opacity="0.45"
    pointer-events="none"
  />

  <!-- Marguerite Magrit centrée couverture -->
  <g transform="translate(527 414.8)">
    <g fill="#FFFFFF"><ellipse cx="0" cy="-33.800000000000004" rx="4.55" ry="20.8" transform="rotate(0)"/><ellipse cx="0" cy="-33.800000000000004" rx="4.55" ry="20.8" transform="rotate(20)"/><ellipse cx="0" cy="-33.800000000000004" rx="4.55" ry="20.8" transform="rotate(40)"/><ellipse cx="0" cy="-33.800000000000004" rx="4.55" ry="20.8" transform="rotate(60)"/><ellipse cx="0" cy="-33.800000000000004" rx="4.55" ry="20.8" transform="rotate(80)"/><ellipse cx="0" cy="-33.800000000000004" rx="4.55" ry="20.8" transform="rotate(100)"/><ellipse cx="0" cy="-33.800000000000004" rx="4.55" ry="20.8" transform="rotate(120)"/><ellipse cx="0" cy="-33.800000000000004" rx="4.55" ry="20.8" transform="rotate(140)"/><ellipse cx="0" cy="-33.800000000000004" rx="4.55" ry="20.8" transform="rotate(160)"/><ellipse cx="0" cy="-33.800000000000004" rx="4.55" ry="20.8" transform="rotate(180)"/><ellipse cx="0" cy="-33.800000000000004" rx="4.55" ry="20.8" transform="rotate(200)"/><ellipse cx="0" cy="-33.800000000000004" rx="4.55" ry="20.8" transform="rotate(220)"/><ellipse cx="0" cy="-33.800000000000004" rx="4.55" ry="20.8" transform="rotate(240)"/><ellipse cx="0" cy="-33.800000000000004" rx="4.55" ry="20.8" transform="rotate(260)"/><ellipse cx="0" cy="-33.800000000000004" rx="4.55" ry="20.8" transform="rotate(280)"/><ellipse cx="0" cy="-33.800000000000004" rx="4.55" ry="20.8" transform="rotate(300)"/><ellipse cx="0" cy="-33.800000000000004" rx="4.55" ry="20.8" transform="rotate(320)"/><ellipse cx="0" cy="-33.800000000000004" rx="4.55" ry="20.8" transform="rotate(340)"/></g>
    <circle r="14.3" fill="url(#mgCoreCover)"/>
  </g>

  <!-- "Magrit" italic + tagline + référence sur couverture -->
  <text x="527" y="474.8" text-anchor="middle" font-family="Inter" font-size="40" font-weight="500" font-style="italic" fill="#0F172A" letter-spacing="-0.025em">Magrit</text>
  <text x="527" y="498.8" text-anchor="middle" font-family="Inter" font-size="11" font-weight="400" fill="#0F172A" fill-opacity="0.60" letter-spacing="0.08em">IMPRIMERIE · IA</text>
  <text x="527" y="754" text-anchor="middle" font-family="Inter" font-size="11" font-weight="500" fill="#0F172A" fill-opacity="0.50" letter-spacing="0.04em">Brochure A4</text>

  <!-- Liseré pollen jaune en bas de couverture -->
  <rect x="332" y="772" width="364" height="6" fill="#F5B529" opacity="0.85"/>
</svg>